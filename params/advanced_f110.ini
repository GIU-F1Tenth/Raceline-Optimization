### vehicle parameters (minimum lap time optimization)
# wheelbase_front:              [m] front wheelbase (from CG to front axle)
# wheelbase_rear:               [m] rear wheelbase (from CG to rear axle)
# track_width_front:            [m] front track width (wheel center to center)
# track_width_rear:             [m] rear track width
# cog_z:                        [m] center of gravity height (lowered with battery placement)
# I_z:                          [kgm^2] yaw moment of inertia (measured/calculated for F1/10)
# liftcoeff_front:              [kg*m2/m3] lift coefficient front (minimal for F1/10)
# liftcoeff_rear:               [kg*m2/m3] lift coefficient rear (minimal for F1/10)
# k_brake_front:                [-] front brake force distribution (tuned for stability)
# k_drive_front:                [-] front drive force (0.0 for RWD F1/10)
# k_roll:                       [-] roll moment distribution front
# t_delta:                      [s] steering time constant (fast servo: Hitec HS-5645MG)
# t_drive:                      [s] drive time constant (brushless motor response)
# t_brake:                      [s] brake time constant (electronic braking)
# power_max:                    [W] max motor power (modified Traxxas Velineon: 3500W peak)
# f_drive_max:                  [N] max drive force (limited by motor torque and tire grip)
# f_brake_max:                  [N] max brake force (regenerative + friction)
# delta_max:                    [rad] max steering angle (Ackermann geometry limit)

