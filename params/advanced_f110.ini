### powertrain behavior (minimum lap time optimization)
# pwr_behavior:                 [-] consider powertrain behavior in optimization
# simple_loss:                  [-] use simple loss models
# T_env:                        [°C] environment temperature
# T_mot_ini:                    [°C] initial motor temperature
# T_batt_ini:                   [°C] initial battery temperature
# T_inv_ini:                    [°C] initial ESC/inverter temperature
# T_cool_mi_ini:                [°C] initial cooling temp (passive cooling)
# T_cool_b_ini:                 [°C] initial battery cooling temp
# r_wheel:                      [m] wheel radius (stock F1/10: 0.0325m radius)
# R_i_simple:                   [Ohm] battery internal resistance (3S LiPo ~0.008-0.015 Ohm)
# V_OC_simple:                  [V] battery open circuit voltage (3S LiPo: 11.1V nominal, 12.6V max)
# SOC_ini:                      [-] initial state of charge
# C_batt:                       [kWh] battery capacity (5000mAh 3S = 0.0555 kWh)
# temp_mot_max:                 [°C] max motor temperature (brushless: 80-100°C)
# temp_batt_max:                [°C] max battery temperature (LiPo safe: 45-50°C)
# temp_inv_max:                 [°C] max ESC temperature (60-80°C typical)
# power_max:                    [W] max power (matches vehicle_params)
# transmission:                 [-] gear ratio (motor to wheel)


