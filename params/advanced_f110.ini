[OPTIMIZATION_OPTIONS]

### optimization problem options (shortest path optimization) ----------------------------------------------------------
# width_opt:                    [m] vehicle width for optimization including safety distance

optim_opts_shortest_path={"width_opt": 0.35}

### optimization problem options (minimum curvature optimization) ------------------------------------------------------
# width_opt:                    [m] vehicle width for optimization including safety distance
# iqp_iters_min:                [-] minimum number of iterations for the IQP
# iqp_curverror_allowed:        [rad/m] maximum allowed curvature error for the IQP

optim_opts_mincurv={"width_opt": 0.38,
                    "iqp_iters_min": 5,
                    "iqp_curverror_allowed": 0.005}

### optimization problem options (minimum lap time optimization) -------------------------------------------------------
# width_opt:                    [m] vehicle width for optimization including safety distance (aggressive)
# penalty_delta:                [-] penalty of delta derivative for improved smoothness (tuned for F1/10 dynamics)
# penalty_F:                    [-] penalty of F derivative for smooth power application
# mue:                          [-] friction coefficient (high-grip racing tires on indoor surface)
# n_gauss                       [-] number of gaussian basis functions on each side (var_friction: "gauss")
# dn                            [m] distance of equidistant points on normal vectors
# limit_energy:                 [true/false] limit energy consumption
# energy_limit:                 [kWh/lap] energy consumption limit
# safe_traj:                    [true/false] safe trajectories -> limit accelerations
# ax_pos_safe:                  [m/s2] a_x+ limit for safe trajectories
# ax_neg_safe:                  [m/s2] a_x- limit for safe trajectories
# ay_safe:                      [m/s2] a_y limit for safe trajectories
# w_tr_reopt:                   [m] total track width for reoptimization
# w_veh_reopt:                  [m] vehicle width for reoptimization
# w_add_spl_regr:               [m] width compensation for spline regression
# step_non_reg:                 [-] points skipped per step during non-regular sampling
# eps_kappa:                    [rad/m] curvature threshold for straight skipping

optim_opts_mintime={"width_opt": 0.40,
                    "penalty_delta": 15.0,
                    "penalty_F": 0.005,
